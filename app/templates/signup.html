<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Wishlist - Sign Up</title>
    <link rel="stylesheet" href="/static/styles.css?v=3">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 2rem; background: rgba(255, 255, 255, 0.05); border-radius: 8px; }
        .auth-container input { width: 100%; padding: 10px; margin-bottom: 1rem; border-radius: 4px; border: 1px solid var(--border-subtle, rgba(255,255,255,0.2)); background: var(--bg-input, rgba(255,255,255,0.1)); color: var(--text-primary, white); }
        .auth-btn { width: 100%; padding: 10px; background: #6c5ce7; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container auth-container">
        <h2>Sign Up</h2>
        {% if error %}
        <p style="color: #ff7675;">{{ error }}</p>
        {% endif %}
        <form action="/signup" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="auth-btn">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">Already have an account? <a href="/login" style="color: #a29bfe;">Log in</a></p>
    </div>
</body>
</html>
