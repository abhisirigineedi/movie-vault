<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Movie Wishlist — keep track of the movies you want to watch." />
    <title>🎬 Movie Wishlist</title>

    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Custom styles (cache-busted) -->
    <link rel="stylesheet" href="/static/styles.css?v=2" />

    <!-- Google Font — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
</head>
<body>
    <!-- Animated floating background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎬 Movie Wishlist</h1>
            <p class="subtitle">Keep track of the movies you want to watch</p>
        </header>

        <!-- Add-movie form (HTMX powered) -->
        <form
            id="add-movie-form"
            hx-post="/add-movie"
            hx-target="#movie-list"
            hx-swap="innerHTML"
            hx-on::after-request="this.reset()"
        >
            <div class="input-group">
                <input
                    type="text"
                    id="movie-title"
                    name="title"
                    placeholder="Enter a movie name…"
                    required
                    autocomplete="off"
                />
                <button type="submit" id="add-movie-btn">
                    <span class="btn-icon">＋</span> Add Movie
                </button>
            </div>
        </form>

        <!-- Movie list section -->
        <section class="movie-list-section">
            <h2>Your Movies</h2>
            <ul id="movie-list">
                {% for movie in movies %}
                <li>
                    <span class="movie-number">{{ loop.index }}.</span>
                    <span class="movie-title">{{ movie.title }}</span>
                    <button class="delete-btn" hx-delete="/delete-movie/{{ movie.id }}" hx-target="closest li" hx-swap="outerHTML" aria-label="Delete movie">✕</button>
                </li>
                {% endfor %}
            </ul>

            {% if not movies %}
            <p class="empty-state" id="empty-state">
                No movies yet — add one above! 🍿
            </p>
            {% endif %}
        </section>
    </div>

    <!-- Hide the empty-state text once a movie is added -->
    <script>
        document.body.addEventListener("htmx:afterSwap", function (evt) {
            const list = document.getElementById("movie-list");
            const empty = document.getElementById("empty-state");
            if (empty && list && list.children.length > 0) {
                empty.style.display = "none";
            }
        });
    </script>
</body>
</html>
