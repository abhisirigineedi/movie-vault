# ──────────────────────────────────────────────
# Render Blueprint — Movie Wishlist v1.0
# ──────────────────────────────────────────────
# Deploy: connect your GitHub repo in Render and
# it will auto-detect this file.

databases:
  - name: movie-wishlist-db
    plan: free
    databaseName: movie_wishlist
    user: movie_user

services:
  - type: web
    name: movie-wishlist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: movie-wishlist-db
          property: connectionURI
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
